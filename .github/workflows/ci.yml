name: System Integration CI

on:
  push:
    branches: [ "main", "test-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-go-receiver:
    name: Build Go Receiver
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26' # Matching your Dockerfile!
        
    - name: Verify Go Build
      run: |
        cd receiver
        go mod download
        go build -v ./...

  test-python-worker:
    name: Build Python Worker
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Verify Python Dependencies & Syntax
      run: |
        cd worker
        pip install -r requirements.txt
        python -m py_compile main.py

  test-docker-infrastructure:
    name: Verify Docker Compose
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Test Docker Build
      run: docker compose build