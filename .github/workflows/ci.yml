name: System Integration CI

on:
  push:
    branches: [ "main", "test-*", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-go-receiver:
    name: Lint & Build Go
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        
    - name: Go Lint (Vet)
      run: |
        cd receiver
        # 'go vet' examines Go source code and reports suspect constructs
        go vet ./...

    - name: Verify Go Build
      run: |
        cd receiver
        go build -v ./...

  test-python-worker:
    name: Lint & Build Python
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Linters
      run: pip install flake8

    - name: Python Lint (Flake8)
      run: |
        cd worker
        # F401: catches unused imports
        # F821: catches undefined names (like 'pika' if import is missing!)
        flake8 main.py --count --select=F401,F821 --show-source --statistics

    - name: Verify Python Syntax
      run: |
        cd worker
        python -m py_compile main.py

  test-docker-infrastructure:
    name: Lint & Build Docker
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Dockerfile Lint (Hadolint)
      # Using a pre-built action is the standard "Pro" way
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: receiver/Dockerfile

    - name: Verify Docker Compose Syntax
      run: docker compose config

    - name: Test Docker Build
      run: docker compose build